<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - TOSCABLUE</title>
    
    <!-- Bootstrap 5 CSS (CDN-methode) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Eigen Stylesheet -->
    <link rel="stylesheet" href="Assets/CSS/style.css">
    <!-- Google Fonts linken (Syne & Plus Jakarta Sans) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <!-- JOUW ULTIEME STRAND & TROPISCHE BLOEMEN VIBE (Overschrijft Bootstrap-stijlen) -->
    <style>
        body {
            /* Verloop van helder lichtblauw water naar een zacht, wit zandstrand */
            background: linear-gradient(180deg, #a0e6ff 0%, #e8f7fc 50%, #fcfbf7 100%); 
            color: #00334e; /* Donker oceaanblauw voor perfect leesbare tekst */
            font-weight: 500;
        }
        /* De navigatiebalk en footer in helder, licht tropisch blauw */
        .bg-beach-blue {
            background-color: #33ccff !important; 
        }
        /* Tekst en knoppen in fel, tropisch bloemenroze */
        .text-tropical-pink {
            color: #ff007f !important;
        }
        .btn-tropical-pink {
            background-color: #ff007f !important;
            color: #ffffff !important;
            border: none;
        }
        .btn-tropical-pink:hover {
            background-color: #e60072 !important;
        }
        /* Accentkleur voor de merknaam en actieve links: zonnig geel */
        .text-sunny-yellow {
            color: #fff200 !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        /* Subtiel roze randje voor de afscheidingen */
        .border-pink {
            border-color: #ff007f !important;
        }
        /* Witte, licht doorschijnende 'beachclub' vakken voor het formulier */
        .beach-card {
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(51, 204, 255, 0.4);
        }
        /* Styling voor de invoervelden */
        .form-control {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid #33ccff;
            color: #00334e;
        }
        .form-control:focus {
            border-color: #ff007f;
            box-shadow: 0 0 0 0.25rem rgba(255, 0, 127, 0.15);
        }
        body {
    /* Verloop van helder lichtblauw water naar een zacht, wit zandstrand */
    background: linear-gradient(180deg, #a0e6ff 0%, #e8f7fc 50%, #fcfbf7 100%); 
    color: #00334e; /* Donker oceaanblauw voor perfect leesbare tekst */
    font-family: 'Plus Jakarta Sans', sans-serif; /* Modern, fris lopend lettertype */
    font-weight: 500;
}

/* Geef alle grote titels en logo's die vette pop/fashion vibe */
h1, h2, h3, .display-3, .display-4 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    text-transform: uppercase; /* Alles in stoere hoofdletters */
    letter-spacing: -1px; /* Letters iets dichter bij elkaar voor een compacte look */
}

/* Extra dikke bounce voor de allergrootste titel op de homepagina */
.display-3 {
    letter-spacing: -2px;
    text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.8); /* Subtiele witte 3D schaduw */
}
    </style>
  </head>
  <body class="d-flex flex-column min-vh-100">

    <!-- HEADER & NAVIGATIE (Lichtblauw water - Responsief via Flexbox) -->
    <header class="p-3 bg-beach-blue border-bottom border-pink shadow-sm">
        <div class="container-sm d-flex justify-content-between align-items-center">
            <!-- Titel / Merknaam -->
            <h3 class="mb-0 text-sunny-yellow fw-bold">TOSCABLUE</h3>
            
            <!-- Menu met drie links (Contact is nu actief/geel) -->
            <nav>
                <a href="index.html" class="text-white-50 text-decoration-none me-3 fw-bold">Home</a>
                <a href="overmij.html" class="text-white-50 text-decoration-none me-3 fw-bold">Over mij</a>
                <a href="contact.html" class="text-sunny-yellow text-decoration-none fw-bold">Contact</a>
            </nav>
        </div>
    </header>

    <!-- HOOFDCONTENU (Gebruikt container-sm voor de 576px eis) -->
    <main class="flex-grow-1 my-5">
        <div class="container-sm">
            
            <!-- Pagina Titel -->
            <div class="row mb-5">
                <div class="col-12 text-center text-md-start">
                    <h1 class="display-4 fw-black text-tropical-pink">Contact</h1>
                    <p class="lead fw-bold" style="color: #005580;">
                        Heeft u een vraag, opmerking of wilt u gewoon even hallo zeggen? Vul het onderstaande formulier in en ik neem zo snel mogelijk contact met u op.
                    </p>
                </div>
            </div>

            <!-- BOOTSTRAP CONTACTFORMULIER (Naam, E-mail, Bericht en Verzendknop) -->
            <div class="row justify-content-center">
                <div class="col-12 col-md-8">
                    
                    <form action="#" method="POST" class="p-4 rounded shadow-sm beach-card">
                        
                        <!-- Veld 1: Naam -->
                        <div class="mb-3">
                            <label for="naam" class="form-label fw-bold" style="color: #005580;">Naam</label>
                            <input type="text" class="form-control" id="naam" placeholder="Uw volledige naam" required>
                        </div>

                        <!-- Veld 2: E-mail -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold" style="color: #005580;">E-mailadres</label>
                            <input type="email" class="form-control" id="email" placeholder="naam@voorbeeld.com" required>
                        </div>

                        <!-- Veld 3: Bericht -->
                        <div class="mb-4">
                            <label for="bericht" class="form-label fw-bold" style="color: #005580;">Bericht</label>
                            <textarea class="form-control" id="bericht" rows="5" placeholder="Typ hier uw bericht..." required></textarea>
                        </div>

                        <!-- Verzendknop (Felroze) -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-tropical-pink fw-bold px-4 py-2 shadow-sm">Verzenden</button>
                        </div>

                    </form>

                </div>
            </div>

        </div> <!-- Einde container-sm -->
    </main>

    <!-- FOOTER (Minimaal 200px hoog, strand-blauw met copyright) -->
    <footer class="p-3 bg-beach-blue text-center border-top border-pink d-flex align-items-center justify-content-center" style="min-height: 200px;">
        <div class="container-sm">
            <p class="mb-0 text-white fw-bold">&copy; 2026 TOSCABLUE - Alle rechten voorbehouden.</p>
            <small class="text-sunny-yellow d-block mt-2 fw-bold">Huiswerkopdracht Webdesign - Tropical Ocean Style</small>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle (CDN-methode) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
